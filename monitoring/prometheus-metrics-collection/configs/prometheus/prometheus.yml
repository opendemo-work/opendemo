global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'opendemo-prometheus'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/node_alerts.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'custom-app'
    static_configs:
      - targets: ['custom-app:8080']
