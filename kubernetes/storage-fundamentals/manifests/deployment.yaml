apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-fundamentals
  labels:
    app: storage-fundamentals
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storage-fundamentals
  template:
    metadata:
      labels:
        app: storage-fundamentals
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
