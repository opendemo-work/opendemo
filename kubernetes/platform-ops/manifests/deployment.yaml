apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-ops
  labels:
    app: platform-ops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-ops
  template:
    metadata:
      labels:
        app: platform-ops
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
