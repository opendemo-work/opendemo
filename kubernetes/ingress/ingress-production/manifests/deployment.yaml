apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress-production
  labels:
    app: ingress-production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingress-production
  template:
    metadata:
      labels:
        app: ingress-production
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
