apiVersion: apps/v1
kind: Deployment
metadata:
  name: advanced-networking
  labels:
    app: advanced-networking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: advanced-networking
  template:
    metadata:
      labels:
        app: advanced-networking
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
