apiVersion: apps/v1
kind: Deployment
metadata:
  name: network-topology-visualization
  labels:
    app: network-topology-visualization
spec:
  replicas: 1
  selector:
    matchLabels:
      app: network-topology-visualization
  template:
    metadata:
      labels:
        app: network-topology-visualization
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
