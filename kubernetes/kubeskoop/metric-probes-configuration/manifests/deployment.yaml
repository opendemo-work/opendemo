apiVersion: apps/v1
kind: Deployment
metadata:
  name: metric-probes-configuration
  labels:
    app: metric-probes-configuration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metric-probes-configuration
  template:
    metadata:
      labels:
        app: metric-probes-configuration
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
