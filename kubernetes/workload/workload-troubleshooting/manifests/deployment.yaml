apiVersion: apps/v1
kind: Deployment
metadata:
  name: workload-troubleshooting
  labels:
    app: workload-troubleshooting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workload-troubleshooting
  template:
    metadata:
      labels:
        app: workload-troubleshooting
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
