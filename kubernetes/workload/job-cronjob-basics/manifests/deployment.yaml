apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-cronjob-basics
  labels:
    app: job-cronjob-basics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-cronjob-basics
  template:
    metadata:
      labels:
        app: job-cronjob-basics
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
