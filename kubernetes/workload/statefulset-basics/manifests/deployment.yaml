apiVersion: apps/v1
kind: Deployment
metadata:
  name: statefulset-basics
  labels:
    app: statefulset-basics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: statefulset-basics
  template:
    metadata:
      labels:
        app: statefulset-basics
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
