apiVersion: apps/v1
kind: Deployment
metadata:
  name: longhorn-distributed-storage
  labels:
    app: longhorn-distributed-storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: longhorn-distributed-storage
  template:
    metadata:
      labels:
        app: longhorn-distributed-storage
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
