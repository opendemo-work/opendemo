apiVersion: apps/v1
kind: Deployment
metadata:
  name: kserve-ab-testing-demo
  labels:
    app: kserve-ab-testing-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kserve-ab-testing-demo
  template:
    metadata:
      labels:
        app: kserve-ab-testing-demo
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
