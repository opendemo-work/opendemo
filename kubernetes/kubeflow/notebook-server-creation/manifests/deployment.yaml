apiVersion: apps/v1
kind: Deployment
metadata:
  name: notebook-server-creation
  labels:
    app: notebook-server-creation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notebook-server-creation
  template:
    metadata:
      labels:
        app: notebook-server-creation
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
