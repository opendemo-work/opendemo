apiVersion: apps/v1
kind: Deployment
metadata:
  name: extensions
  labels:
    app: extensions
spec:
  replicas: 1
  selector:
    matchLabels:
      app: extensions
  template:
    metadata:
      labels:
        app: extensions
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
