apiVersion: apps/v1
kind: Deployment
metadata:
  name: basic-ai-infra
  labels:
    app: basic-ai-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: basic-ai-infra
  template:
    metadata:
      labels:
        app: basic-ai-infra
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
