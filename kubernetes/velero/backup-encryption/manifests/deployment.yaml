apiVersion: apps/v1
kind: Deployment
metadata:
  name: backup-encryption
  labels:
    app: backup-encryption
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backup-encryption
  template:
    metadata:
      labels:
        app: backup-encryption
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
