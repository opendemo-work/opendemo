apiVersion: apps/v1
kind: Deployment
metadata:
  name: namespace-backup
  labels:
    app: namespace-backup
spec:
  replicas: 1
  selector:
    matchLabels:
      app: namespace-backup
  template:
    metadata:
      labels:
        app: namespace-backup
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
