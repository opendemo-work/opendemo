apiVersion: apps/v1
kind: Deployment
metadata:
  name: velero
  labels:
    app: velero
spec:
  replicas: 1
  selector:
    matchLabels:
      app: velero
  template:
    metadata:
      labels:
        app: velero
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
