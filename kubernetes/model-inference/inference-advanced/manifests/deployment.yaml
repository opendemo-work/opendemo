apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-advanced
  labels:
    app: inference-advanced
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-advanced
  template:
    metadata:
      labels:
        app: inference-advanced
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
