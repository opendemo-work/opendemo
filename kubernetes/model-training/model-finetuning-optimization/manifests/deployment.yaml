apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-finetuning-optimization
  labels:
    app: model-finetuning-optimization
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-finetuning-optimization
  template:
    metadata:
      labels:
        app: model-finetuning-optimization
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
