apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-operations
  labels:
    app: monitoring-operations
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitoring-operations
  template:
    metadata:
      labels:
        app: monitoring-operations
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
