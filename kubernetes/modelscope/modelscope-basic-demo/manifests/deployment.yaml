apiVersion: apps/v1
kind: Deployment
metadata:
  name: modelscope-basic-demo
  labels:
    app: modelscope-basic-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: modelscope-basic-demo
  template:
    metadata:
      labels:
        app: modelscope-basic-demo
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
