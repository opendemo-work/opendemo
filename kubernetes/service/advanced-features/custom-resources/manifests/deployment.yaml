apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-resources
  labels:
    app: custom-resources
spec:
  replicas: 1
  selector:
    matchLabels:
      app: custom-resources
  template:
    metadata:
      labels:
        app: custom-resources
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
