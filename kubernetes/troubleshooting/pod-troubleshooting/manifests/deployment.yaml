apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod-troubleshooting
  labels:
    app: pod-troubleshooting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pod-troubleshooting
  template:
    metadata:
      labels:
        app: pod-troubleshooting
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
