apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag
  labels:
    app: rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag
  template:
    metadata:
      labels:
        app: rag
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
