apiVersion: apps/v1
kind: Deployment
metadata:
  name: other-rag-tools
  labels:
    app: other-rag-tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: other-rag-tools
  template:
    metadata:
      labels:
        app: other-rag-tools
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
