apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp
  labels:
    app: mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp
  template:
    metadata:
      labels:
        app: mcp
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
