apiVersion: apps/v1
kind: Deployment
metadata:
  name: topic-structural-trouble-shooting
  labels:
    app: topic-structural-trouble-shooting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: topic-structural-trouble-shooting
  template:
    metadata:
      labels:
        app: topic-structural-trouble-shooting
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
