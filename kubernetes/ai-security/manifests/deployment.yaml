apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-security
  labels:
    app: ai-security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-security
  template:
    metadata:
      labels:
        app: ai-security
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
