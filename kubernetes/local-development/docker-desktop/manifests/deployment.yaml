apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-desktop
  labels:
    app: docker-desktop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docker-desktop
  template:
    metadata:
      labels:
        app: docker-desktop
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
