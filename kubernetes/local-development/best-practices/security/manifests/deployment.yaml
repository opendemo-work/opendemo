apiVersion: apps/v1
kind: Deployment
metadata:
  name: security
  labels:
    app: security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: security
  template:
    metadata:
      labels:
        app: security
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
