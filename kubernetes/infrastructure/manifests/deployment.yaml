apiVersion: apps/v1
kind: Deployment
metadata:
  name: infrastructure
  labels:
    app: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infrastructure
  template:
    metadata:
      labels:
        app: infrastructure
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
