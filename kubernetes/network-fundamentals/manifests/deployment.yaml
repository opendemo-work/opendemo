apiVersion: apps/v1
kind: Deployment
metadata:
  name: network-fundamentals
  labels:
    app: network-fundamentals
spec:
  replicas: 1
  selector:
    matchLabels:
      app: network-fundamentals
  template:
    metadata:
      labels:
        app: network-fundamentals
    spec:
      containers:
      - name: demo
        image: nginx:alpine
        ports:
        - containerPort: 80
