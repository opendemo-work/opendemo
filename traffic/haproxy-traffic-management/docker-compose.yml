version: '3.8'
services:
  haproxy:
    image: haproxy:2.8-alpine
    container_name: haproxy-traffic
    ports:
      - "8080:80"
    volumes:
      - ./configs/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - backend
    depends_on:
      - app

  app:
    image: nginx:alpine
    container_name: haproxy-traffic-app
    networks:
      - backend

networks:
  backend:
    driver: bridge
