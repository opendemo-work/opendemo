version: '3.8'
services:
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "8080:80"
    volumes:
      - ./configs/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend
    depends_on:
      - app1
      - app2

  app1:
    image: nginx:alpine
    container_name: backend-app1
    volumes:
      - ./html/app1.html:/usr/share/nginx/html/index.html:ro
    networks:
      - backend

  app2:
    image: nginx:alpine
    container_name: backend-app2
    volumes:
      - ./html/app2.html:/usr/share/nginx/html/index.html:ro
    networks:
      - backend

networks:
  backend:
    driver: bridge
