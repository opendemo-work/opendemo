version: '3.8'
services:
  haproxy:
    image: haproxy:2.8-alpine
    container_name: haproxy-ssl
    ports:
      - "8443:443"
    volumes:
      - ./configs/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./certs:/usr/local/etc/haproxy/certs:ro
    networks:
      - backend
    depends_on:
      - app

  app:
    image: nginx:alpine
    container_name: haproxy-ssl-app
    volumes:
      - ./html/index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - backend

networks:
  backend:
    driver: bridge
