version: '3.8'
services:
  nameserver:
    image: apache/rocketmq:5.1.4
    container_name: rmqnameserver
    command: sh mqnamesrv
    ports:
      - "9876:9876"
    networks:
      - rocketmq

  broker:
    image: apache/rocketmq:5.1.4
    container_name: rmqbroker
    command: sh mqbroker -n nameserver:9876 -c /home/rocketmq/rocketmq-5.1.4/conf/broker.conf
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    volumes:
      - ./configs/broker.conf:/home/rocketmq/rocketmq-5.1.4/conf/broker.conf:ro
    environment:
      - NAMESRV_ADDR=nameserver:9876
    depends_on:
      - nameserver
    networks:
      - rocketmq

  dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: rmqdashboard
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Drocketmq.namesrv.addr=nameserver:9876
    depends_on:
      - nameserver
    networks:
      - rocketmq

networks:
  rocketmq:
    driver: bridge
