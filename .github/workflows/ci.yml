name: OpenDemo CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  JAVA_VERSION: '17'

jobs:
  # ========== P0: 五星结构门禁（必须通过）==========
  five-star-validation:
    name: Five Star Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run Five Star Validation
        run: |
          python scripts/quality/validate_five_star.py
      - name: Upload validation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: five-star-validation-report
          path: |
            check/five_star_validation_report.json
            check/five_star_validation_report.md

  # ========== P1: 快速检查 ==========
  pre-check:
    name: Pre-check
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          echo "skip=false" >> $GITHUB_OUTPUT

  # ========== P2: 并行化技术栈检查 ==========
  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    needs: pre-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go/**/go.mod
      - name: Run Go Lint
        run: |
          go install golang.org/x/lint/golint@latest
          find go -name "*.go" -type f -not -path "*/vendor/*" | head -50 | xargs -I {} golint {}

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    needs: pre-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install flake8 black isort
      - name: Run Python Lint
        run: |
          flake8 opendemo-cli/ python/ --count --select=E9,F63,F7,F82 --show-source --statistics
          black --check opendemo-cli/ python/
          isort --check-only opendemo-cli/ python/

  lint-nodejs:
    name: Lint Node.js
    runs-on: ubuntu-latest
    needs: pre-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run Node.js Lint
        run: |
          cd nodejs
          find . -maxdepth 2 -name "package.json" -print0 | while IFS= read -r -d '' f; do
            dir=$(dirname "$f")
            echo "Checking $dir"
          done

  lint-java:
    name: Lint Java
    runs-on: ubuntu-latest
    needs: pre-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - name: Run Java checks
        run: |
          if [ -f "java/pom.xml" ]; then
            echo "Maven project detected"
          fi
          find java -name "*.java" -type f | head -20

  # ========== P3: 并行化测试（允许失败，不阻断）==========
  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    needs: pre-check
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go/**/go.mod
      - name: Run Go Tests
        run: |
          find go -name "go.mod" -type f | while read f; do
            dir=$(dirname "$f")
            echo "Testing $dir..."
            (cd "$dir" && go test ./... 2>/dev/null || echo "Tests failed or not found in $dir")
          done

  test-nodejs:
    name: Test Node.js
    runs-on: ubuntu-latest
    needs: pre-check
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run Node.js Tests
        run: |
          find nodejs -maxdepth 2 -name "package.json" -type f | while read f; do
            dir=$(dirname "$f")
            echo "Testing $dir..."
            (cd "$dir" && npm test 2>/dev/null || echo "Tests failed or not found in $dir")
          done

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    needs: pre-check
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install pytest pytest-cov
      - name: Run Python Tests
        run: |
          find python ai-ml bigdata -name "test_*.py" -o -name "*_test.py" | while read f; do
            dir=$(dirname "$f")
            echo "Testing $dir..."
            (cd "$dir" && python -m pytest . 2>/dev/null || echo "Tests failed or not found in $dir")
          done

  test-java:
    name: Test Java
    runs-on: ubuntu-latest
    needs: pre-check
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - name: Run Java Tests
        run: |
          find java -name "pom.xml" -o -name "build.gradle" | head -20 | while read f; do
            dir=$(dirname "$f")
            echo "Testing $dir..."
          done

  # ========== P4: 安全检查 ==========
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: pre-check
    steps:
      - uses: actions/checkout@v4
      - name: Run Security Checks
        run: |
          chmod +x scripts/security/check_security.sh
          ./scripts/security/check_security.sh
      - name: Check for secrets
        run: |
          if grep -r --include="*.py" --include="*.js" --include="*.go" --include="*.java" \
             -i "password\s*=\s*['\"][^'\"]\{4,\}['\"]" . 2>/dev/null | grep -v ".git"; then
            echo "Potential hardcoded password found"
            exit 1
          fi
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

  # ========== P5: 代码质量汇总 ==========
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: pre-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Python Code Quality
        run: |
          pip install black flake8 isort
          black --check opendemo-cli/ python/
          flake8 opendemo-cli/ python/ --count --statistics
      - name: Node.js Code Quality
        run: |
          if command -v npm &> /dev/null; then
            npm install -g prettier eslint
            prettier --check "nodejs/**/*.js"
          fi
      - name: Go Code Quality
        run: |
          if command -v golangci-lint &> /dev/null; then
            golangci-lint run ./go/...
          fi

  # ========== 汇总报告 ==========
  summary:
    name: Summary
    needs: [five-star-validation, lint-go, lint-python, lint-nodejs, lint-java, test-go, test-nodejs, test-python, test-java, security, code-quality]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Five Star Validation | ${{ needs.five-star-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint Go | ${{ needs.lint-go.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint Python | ${{ needs.lint-python.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint Node.js | ${{ needs.lint-nodejs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint Java | ${{ needs.lint-java.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Go | ${{ needs.test-go.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Node.js | ${{ needs.test-nodejs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Python | ${{ needs.test-python.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Java | ${{ needs.test-java.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
