name: OpenDemo CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  JAVA_VERSION: '17'

jobs:
  # ========== P0: 快速检查 ==========
  pre-check:
    name: Pre-check
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          # 检查是否有实质性代码变更
          if git log --since="24 hours ago" --oneline | grep -q "^Merge"; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  # ========== P1: 并行化技术栈检查 ==========
  # Go 质量检查
  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go/**/go.mod
      - name: Run Go Lint
        run: |
          go install golang.org/x/lint/golint@latest
          find go -name "*.go" -type f -not -path "*/vendor/*" | head -50 | xargs -I {} golint {} || true

  # Python 质量检查
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            opendemo-cli/requirements.txt
            configs/pyproject.toml
      - name: Install dependencies
        run: pip install flake8 black isort
      - name: Run Python Lint
        run: |
          flake8 opendemo-cli/ python/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
          black --check opendemo-cli/ python/ || true
          isort --check-only opendemo-cli/ python/ || true

  # Node.js 质量检查
  lint-nodejs:
    name: Lint Node.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: nodejs/**/package-lock.json
      - name: Run Node.js Lint
        run: |
          cd nodejs && find . -name "package.json" -maxdepth 2 -exec npm install \; || true

  # Java 质量检查
  lint-java:
    name: Lint Java
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: true
      - name: Run Java checks
        run: |
          if [ -f "java/pom.xml" ]; then
            echo "Maven project detected"
          fi
          find java -name "*.java" -type f | head -20 | while read f; do
            echo "Checking $f"
          done

  # ========== P2: 并行化测试 ==========
  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go/**/go.mod
      - name: Run Go Tests
        run: |
          find go -name "*_test.go" -type f | head -10 | while read f; do
            dir=$(dirname "$f")
            echo "Testing $dir..."
            cd "$dir" && go test -v ./... 2>/dev/null || echo "No tests in $dir"
            cd - > /dev/null
          done

  test-nodejs:
    name: Test Node.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Run Node.js Tests
        run: |
          find nodejs -name "*.test.js" -o -name "*test*.js" | head -5 | while read f; do
            echo "Found test: $f"
          done

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: pip install pytest pytest-cov
      - name: Run Python Tests
        run: |
          find python -name "test_*.py" -o -name "*_test.py" | head -5 | while read f; do
            echo "Found test: $f"
          done

  test-java:
    name: Test Java
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: true
      - name: Run Java Tests
        run: |
          find java -name "*Test.java" | head -5 | while read f; do
            echo "Found test: $f"
          done

  # ========== P3: 安全检查 ==========
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Security Checks
        run: |
          chmod +x scripts/security/check_security.sh
          ./scripts/security/check_security.sh || true

      - name: Check for secrets
        run: |
          if grep -r --include="*.py" --include="*.js" --include="*.go" --include="*.java" \
             -i "password\s*=\s*['\"][^'\"]\{4,\}['\"]" . 2>/dev/null | grep -v ".git"; then
            echo "Potential hardcoded password found"
            exit 1
          fi

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

  # ========== P4: 结构验证 ==========
  validate-structure:
    name: Validate Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install CLI dependencies
        run: |
          cd opendemo-cli
          pip install -e . || pip install -r requirements.txt 2>/dev/null || true
      - name: Validate Project Structure
        run: |
          echo "Validating project structure..."
          for dir in go nodejs python java kubernetes database; do
            if [ -d "$dir" ]; then
              echo "OK: $dir/"
            else
              echo "MISSING: $dir/"
            fi
          done
      - name: Check README existence
        run: |
          echo "README files found: $(find . -maxdepth 2 -name 'README.md' -type f | wc -l)"

  # ========== P5: 代码质量汇总 ==========
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Python Code Quality
        run: |
          pip install black flake8 isort
          black --check opendemo-cli/ python/ || true
          flake8 opendemo-cli/ python/ --count --statistics || true
      - name: Node.js Code Quality
        run: |
          if command -v npm &> /dev/null; then
            npm install -g prettier eslint
            prettier --check "nodejs/**/*.js" || true
          fi
      - name: Go Code Quality
        run: |
          if command -v golangci-lint &> /dev/null; then
            golangci-lint run ./go/... || true
          fi

  # ========== 汇总报告 ==========
  summary:
    name: Summary
    needs: [lint-go, lint-python, lint-nodejs, lint-java, test-go, test-nodejs, test-python, test-java, security, validate-structure, code-quality]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint Go | ${{ needs.lint-go.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint Python | ${{ needs.lint-python.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint Node.js | ${{ needs.lint-nodejs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint Java | ${{ needs.lint-java.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Go | ${{ needs.test-go.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Node.js | ${{ needs.test-nodejs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Python | ${{ needs.test-python.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Java | ${{ needs.test-java.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validate Structure | ${{ needs.validate-structure.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY