version: '3.8'
services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: clickhouse-server
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - olap

volumes:
  clickhouse-data:

networks:
  olap:
    driver: bridge
