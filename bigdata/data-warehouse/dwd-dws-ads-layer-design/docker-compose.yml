version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: dw-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: demo_dw
    ports:
      - "3306:3306"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d:ro
      - mysql-data:/var/lib/mysql
    networks:
      - dw

volumes:
  mysql-data:

networks:
  dw:
    driver: bridge
