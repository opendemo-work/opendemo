spring:
  application:
    name: hystrix-demo

server:
  port: 8080

# Hystrix配置
hystrix:
  command:
    default:
      execution:
        isolation:
          thread:
            timeoutInMilliseconds: 3000
      circuitBreaker:
        requestVolumeThreshold: 10
        sleepWindowInMilliseconds: 10000
        errorThresholdPercentage: 50
      metrics:
        rollingStats:
          timeInMilliseconds: 10000

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: hystrix.stream, health, info
  endpoint:
    health:
      show-details: always
