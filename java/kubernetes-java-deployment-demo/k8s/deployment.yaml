apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-demo
  namespace: kubernetes-demo
  labels:
    app: kubernetes-demo
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kubernetes-demo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: kubernetes-demo
        version: v1
    spec:
      containers:
        - name: kubernetes-demo
          image: kubernetes-demo:1.0.0
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "production"
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: WELCOME_MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: kubernetes-demo-config
                  key: welcome-message
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: kubernetes-demo-config
                  key: log-level
            - name: MAX_CONNECTIONS
              valueFrom:
                configMapKeyRef:
                  name: kubernetes-demo-config
                  key: max-connections
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
