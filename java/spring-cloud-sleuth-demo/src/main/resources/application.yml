server:
  port: 8080

spring:
  application:
    name: sleuth-demo
  sleuth:
    sampler:
      probability: 1.0
    web:
      skip-pattern: /actuator.*
    baggage:
      remote-fields: user-id,tenant-id
      correlation-fields: user-id,tenant-id
  zipkin:
    base-url: http://localhost:9411
    sender:
      type: web

logging:
  pattern:
    level: '%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]'
  level:
    root: INFO
    com.example: DEBUG
