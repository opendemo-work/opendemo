server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,beans,loggers,appstatus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
    info:
      enabled: true
    metrics:
      enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: Actuator Demo
    description: Spring Boot Actuator监控演示
    version: 1.0.0
    encoding: UTF-8
  java:
    version: ${java.version}
  spring:
    version: ${spring-framework.version}
